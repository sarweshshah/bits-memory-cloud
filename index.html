<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bits Memory Cloud</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="overlay">
      <h1>Bits Memory Cloud</h1>
      <p id="status">Loading point cloud…</p>
      <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>
    <canvas id="canvas"></canvas>
    <div id="point-tooltip" hidden></div>
    <form id="goto-form" autocomplete="off">
      <label for="goto-id">Go to Point ID</label>
      <input
        type="number"
        id="goto-id"
        min="0"
        step="1"
        placeholder="Point ID"
        disabled
      />
      <button type="submit" disabled>Go</button>
    </form>
    <div id="axis-indicator" aria-hidden="true">
      <svg viewBox="0 0 48 48" width="48" height="48">
        <circle class="axis-indicator__bg" cx="24" cy="24" r="20" />
        <line class="axis-indicator__line axis-x" x1="24" y1="24" x2="24" y2="24" />
        <line class="axis-indicator__line axis-y" x1="24" y1="24" x2="24" y2="24" />
        <line class="axis-indicator__line axis-z" x1="24" y1="24" x2="24" y2="24" />
        <text class="axis-indicator__label axis-x" x="24" y="24">X</text>
        <text class="axis-indicator__label axis-y" x="24" y="24">Y</text>
        <text class="axis-indicator__label axis-z" x="24" y="24">Z</text>
      </svg>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
