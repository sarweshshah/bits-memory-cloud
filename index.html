<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bits Memory Cloud</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="overlay">
      <h1>Bits Memory Cloud</h1>
      <p id="status">Loading point cloud…</p>
      <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>
    <canvas id="canvas"></canvas>
    <div id="point-tooltip" hidden></div>
    <form id="goto-form" autocomplete="off">
      <label for="goto-id">Go to Point ID</label>
      <input
        type="number"
        id="goto-id"
        min="0"
        step="1"
        placeholder="Point ID"
        disabled
      />
      <button type="submit" disabled>Go</button>
    </form>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
